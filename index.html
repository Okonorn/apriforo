<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tetris Online</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Pantalla de Login -->
<div id="login" class="overlay">
  <div class="card">
    <h1>🟦 Tetris Online</h1>
    <p>Introduce tu nombre y un código de sala. Si la sala no existe, se creará.</p>
    <input id="username" type="text" placeholder="Tu nombre" maxlength="16" />
    <input id="roomcode" type="text" placeholder="Código de sala (ej: SALA1)" maxlength="12" />
    <button id="joinBtn">Entrar</button>
  </div>
</div>

<!-- Juego -->
<div id="game" class="hidden">
  <header>
    <h2>Sala: <span id="roomName"></span></h2>
    <div>Jugador: <span id="playerName"></span></div>
    <button id="leaveBtn">Salir</button>
  </header>

  <main>
    <!-- Tablero principal -->
    <section class="board-area">
      <div class="board-wrapper">
        <canvas id="board" width="240" height="480"></canvas>
        <div class="side">
          <div>
            <h3>Siguiente</h3>
            <canvas id="next" width="96" height="96"></canvas>
          </div>
          <div>
            <h3>Puntos</h3>
            <div id="score">0</div>
          </div>
          <div>
            <h3>Líneas</h3>
            <div id="lines">0</div>
          </div>
          <div class="controls-help">
            <small>← → mover · ↑ rotar · ↓ bajar · espacio caída</small>
          </div>
        </div>
      </div>
      <div id="gameOver" class="hidden">GAME OVER — pulsa R para reiniciar</div>
    </section>

    <!-- Otros jugadores -->
    <section class="opponents">
      <h3>Otros jugadores</h3>
      <div id="opponentsList"></div>
    </section>

    <!-- Chat -->
    <section class="chat">
      <h3>Chat</h3>
      <div id="messages"></div>
      <form id="chatForm">
        <input id="chatInput" type="text" placeholder="Escribe..." maxlength="200" autocomplete="off" />
        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>
</div>

<!-- Firebase + lógica -->
<script type="module" src="app.js"></script>
</body>
</html>
